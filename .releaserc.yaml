# A semantic-release configuration for an Obsidian plugin
# run semantic-release as follows to release a new version of your plugin:
#   dry-run (default):  npm run release:dry-run
#   for real:           npm run release:local
#
# Branch strategy
#   main / master         → regular release  (e.g. 1.2.0)
#   beta                  → pre-release      (e.g. 1.2.0-beta.1)
#   any other branch      → pre-release using the sanitised branch name as the
#                           channel identifier, e.g. triggering manually on
#                           "copilot/progress-indicator-and-modal-changes"
#                           produces 1.2.0-copilot-progress-indicator-and-modal-changes.1
#                           Use the "Release plugin version" workflow_dispatch
#                           trigger from any branch to cut a pre-release.
branches:
  - main
  - master
  - name: beta
    prerelease: true
  - name: '**'
    prerelease: '${name.replace(/[^0-9A-Za-z-]+/g, "-")}'

plugins:
  - - "@semantic-release/commit-analyzer"
    - preset: conventionalcommits
  - - "@semantic-release/release-notes-generator"
    - preset: conventionalcommits
  - semantic-release-obsidian-plugin
  - - "@semantic-release/github"
    - assets:
        - path: dist/main.js
        - path: manifest.json
  - - "@semantic-release/git"
    - assets:
        - manifest.json
        - versions.json
        - package.json
      message: >-
        chore(release): set `package.json`, `manifest.json` and
        `versions.json` to ${nextRelease.version} [skip ci]


        ${nextRelease.notes}
tagFormat: "${version}"
